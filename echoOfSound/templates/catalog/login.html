{% extends 'catalog/base.html' %}

{% block title %}Вход — echoOfSound{% endblock %}

{% block content %}
<div class="auth-form">
    <h2>Вход в систему</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">Имя пользователя</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   required
                   autofocus>
        </div>

        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Войти
        </button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        <p>Нет аккаунта?
            <a href="{% url 'register' %}" style="color: var(--primary-color); text-decoration: none;">
                Зарегистрироваться
            </a>
        </p>
    </div>
</div>
{% endblock %}
